<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام متابعة المندوبين - مركز المامون الطبي التشخيصي</title>
    <link rel="stylesheet" href="styles/login.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/icons.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    <link rel="apple-touch-icon" href="assets/icons/logo.png">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <div class="icon icon-logo"></div>
                    <div>
                        <h1>مركز المامون الطبي التشخيصي</h1>
                        <p>قسم العلاقات العامة - نظام متابعة المندوبين</p>
                    </div>
                </div>
            </div>

            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="اسم المستخدم" required>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="كلمة المرور" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-user-tag"></i>
                    <select id="role" required>
                        <option value="">اختر نوع المستخدم</option>
                        <option value="admin">مشرف النظام</option>
                        <option value="employee">مندوب ميداني</option>
                    </select>
                </div>

                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    تسجيل الدخول
                </button>
            </form>

            <div class="demo-accounts">
                <h4><i class="fas fa-key"></i> حسابات تجريبية:</h4>
                <div class="account-list">
                    <div><i class="fas fa-user-shield"></i> <strong>المشرف:</strong> admin / admin123</div>
                    <div><i class="fas fa-user-tie"></i> <strong>المندوب:</strong> employee / 123456</div>
                </div>
            </div>

            <div class="login-footer">
                <p><i class="fas fa-signature"></i> توقيع: سام جميل القدسي - أخصائي العلاقات العامة</p>
                <p><i class="fas fa-copyright"></i> جميع الحقوق محفوظة &copy; 2024 مركز المامون الطبي التشخيصي</p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
